# Deploy Supabase — the operator hour as one button.
#
# The deep scan found NOTHING in this repo runs by existing: migrations, edge functions,
# secrets, and the pg_cron heartbeat were all manual dashboard acts. This workflow makes the
# whole thing one run. It has two modes, chosen by the `mode` input when you dispatch it:
#
#   mode = functions   (DEFAULT) — deploy edge functions + sync function secrets. No database
#                       password required, no migrations run, nothing touches existing data.
#                       This is all that's needed to "light up" the boards' AI.
#   mode = full        — everything: migrations (needs SUPABASE_DB_PASSWORD) + all functions +
#                       secrets + optional heartbeat arm. Use for a from-scratch project bring-up.
#
# One-time setup (repo Settings → Secrets and variables → Actions):
#   REQUIRED (both modes)
#     SUPABASE_ACCESS_TOKEN   — dashboard → Account → Access Tokens (revocable any time)
#   PROJECT REF
#     SUPABASE_PROJECT_REF    — the ref in https://<ref>.supabase.co
#                               (falls back to the repo's known ref if the secret is unset)
#   REQUIRED for mode=full only
#     SUPABASE_DB_PASSWORD    — the project's database password (Settings → Database)
#   OPTIONAL (each is pushed to Edge Function secrets only when set here)
#     ANTHROPIC_API_KEY · OPENAI_API_KEY · WORKER_SECRET · CRON_SECRET ·
#     GOOGLE_PLACES_API_KEY · APP_ORIGIN · RESEND_API_KEY · RESEND_WEBHOOK_SECRET ·
#     INBOUND_SECRET · AI_PROVIDER · AI_MODEL · EMBEDDINGS_API_KEY

name: Deploy Supabase

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'functions (deploy only) or full (migrations + everything)'
        type: choice
        options: [functions, full]
        default: functions
      arm_heartbeat:
        description: 'Arm the pg_cron heartbeat (mode=full; needs WORKER_SECRET)'
        type: boolean
        default: false
  push:
    branches: [main]
    paths: ['supabase/**']

concurrency:
  group: deploy-supabase
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      # Falls back to this project's known ref when the secret isn't set.
      PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF || 'aobrsurgymnyxifoqfpu' }}
      MODE: ${{ inputs.mode || 'functions' }}
    steps:
      - name: Check required secrets
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::Missing repo secret SUPABASE_ACCESS_TOKEN — add it in Settings → Secrets and variables → Actions."
            exit 1
          fi
          echo "Mode: $MODE   Project: $PROJECT_REF"
          if [ "$MODE" = "full" ] && [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "::error::mode=full needs SUPABASE_DB_PASSWORD (for migrations). Use mode=functions, or add the secret."
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      # ── Wake the project if Supabase auto-paused it (free-tier projects sleep after ~1 week
      # idle). A paused project rejects every deploy with "status 'INACTIVE'". We restore via the
      # management API (the runner can reach it), then poll until it reports ACTIVE_HEALTHY.
      - name: Wake the project if paused
        run: |
          set -e
          api="https://api.supabase.com/v1"
          auth="Authorization: Bearer $SUPABASE_ACCESS_TOKEN"
          status=$(curl -s -H "$auth" "$api/projects" | jq -r --arg ref "$PROJECT_REF" '.[] | select(.id==$ref) | .status')
          echo "Current status: ${status:-<project not visible to this token>}"
          if [ -z "$status" ]; then
            echo "::error::Token can't see project $PROJECT_REF. Wrong project ref, or the token lacks access."
            exit 1
          fi
          if [ "$status" != "ACTIVE_HEALTHY" ]; then
            echo "Project is '$status' — asking Supabase to restore it…"
            curl -s -X POST -H "$auth" -H "Content-Type: application/json" \
              "$api/projects/$PROJECT_REF/restore" -d '{}' || true
            for i in $(seq 1 40); do
              sleep 15
              status=$(curl -s -H "$auth" "$api/projects" | jq -r --arg ref "$PROJECT_REF" '.[] | select(.id==$ref) | .status')
              echo "  [$i/40] status: $status"
              [ "$status" = "ACTIVE_HEALTHY" ] && break
            done
          fi
          if [ "$status" != "ACTIVE_HEALTHY" ]; then
            echo "::error::Project did not reach ACTIVE_HEALTHY in time (last: $status). Open the Supabase dashboard, click Restore, and re-run."
            exit 1
          fi
          echo "Project is awake and healthy. Giving the API a moment to settle…"
          sleep 20

      # ── mode=full only: apply migrations. --include-all because this project's schema came from
      # manual SQL pastes, so the migration history table is behind. Every migration is additive +
      # idempotent, so re-applying from the top is safe; history is tracked from then on.
      - name: Apply migrations
        if: ${{ env.MODE == 'full' }}
        run: |
          supabase link --project-ref "$PROJECT_REF"
          supabase db push --include-all

      # ── The AI-facing functions this session added or rebuilt. board-copy is the words seam
      # behind every creative board; it self-authenticates (getUser → 401) so JWT-verified is fine.
      - name: Deploy board functions (JWT-verified)
        run: |
          for fn in board-copy generate-image; do
            echo "── deploying $fn ──"
            supabase functions deploy "$fn" --project-ref "$PROJECT_REF"
          done

      - name: Deploy worker functions (--no-verify-jwt)
        run: |
          for fn in inbox-draft standing-worker; do
            echo "── deploying $fn ──"
            supabase functions deploy "$fn" --project-ref "$PROJECT_REF" --no-verify-jwt
          done

      # ── mode=full only: the rest of the function fleet, via the repo's curated lists.
      - name: Deploy the full function fleet
        if: ${{ env.MODE == 'full' }}
        run: |
          npm run functions:deploy
          npm run functions:deploy:webhooks

      # Push each function secret that exists as a repo secret; skip the rest silently.
      # Values never echo — GitHub masks them and the loop only prints names.
      - name: Sync function secrets
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          WORKER_SECRET: ${{ secrets.WORKER_SECRET }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          APP_ORIGIN: ${{ secrets.APP_ORIGIN }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_WEBHOOK_SECRET: ${{ secrets.RESEND_WEBHOOK_SECRET }}
          INBOUND_SECRET: ${{ secrets.INBOUND_SECRET }}
          AI_PROVIDER: ${{ secrets.AI_PROVIDER }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
          EMBEDDINGS_API_KEY: ${{ secrets.EMBEDDINGS_API_KEY }}
        run: |
          set -e
          synced=""
          for name in ANTHROPIC_API_KEY OPENAI_API_KEY WORKER_SECRET CRON_SECRET \
                      GOOGLE_PLACES_API_KEY APP_ORIGIN RESEND_API_KEY RESEND_WEBHOOK_SECRET \
                      INBOUND_SECRET AI_PROVIDER AI_MODEL EMBEDDINGS_API_KEY; do
            val="${!name}"
            if [ -n "$val" ]; then
              supabase secrets set "$name=$val" --project-ref "$PROJECT_REF" >/dev/null
              synced="$synced $name"
            fi
          done
          echo "Synced:${synced:- (none provided as repo secrets)}"

      # ── mode=full only: schedule the pg_cron jobs via the management API (no DB connection needed).
      - name: Arm heartbeat
        if: ${{ env.MODE == 'full' && inputs.arm_heartbeat }}
        env:
          WORKER_SECRET: ${{ secrets.WORKER_SECRET }}
        run: |
          set -e
          if [ -z "$WORKER_SECRET" ]; then
            echo "::error::arm_heartbeat needs the WORKER_SECRET repo secret."
            exit 1
          fi
          body=$(jq -n --arg q "select public.garvis_arm_heartbeat('https://${PROJECT_REF}.supabase.co/functions/v1', '${WORKER_SECRET}');" '{query:$q}')
          curl -sf -X POST "https://api.supabase.com/v1/projects/${PROJECT_REF}/database/query" \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            -H "Content-Type: application/json" -d "$body" >/dev/null
          echo "Heartbeat: armed."

      # Honest verification: probe the functions we just deployed. Any HTTP answer that isn't 404
      # means the function is live (401/405 are expected for an unauthenticated OPTIONS/GET probe).
      - name: Verify functions are live
        run: |
          set -e
          fail=0
          for fn in board-copy generate-image inbox-draft standing-worker; do
            code=$(curl -s -o /dev/null -w '%{http_code}' -X OPTIONS "https://${PROJECT_REF}.supabase.co/functions/v1/${fn}")
            if [ "$code" = "404" ]; then echo "::error::$fn NOT deployed (404)"; fail=1; else echo "$fn: $code (live)"; fi
          done
          echo
          echo "Done. Open a board, type an idea, hit Make — real copy should appear."
          echo "Then revoke the sbp_ token and rotate any key ever pasted in chat."
          exit $fail
