# Garvis go-live — deploys the AI-facing edge functions to Supabase from a GitHub runner.
# Exists because local sandboxes can't always reach Supabase; GitHub's runners can.
#
# ONE-TIME SETUP (you do this in the GitHub web UI, the safe place for keys):
#   Repo → Settings → Secrets and variables → Actions → "New repository secret"
#   Add these three secrets (names must match EXACTLY):
#     SUPABASE_ACCESS_TOKEN   your sbp_... personal access token
#     ANTHROPIC_API_KEY       your sk-ant-... key
#     OPENAI_API_KEY          your sk-proj-... key  (optional; leave out to skip images)
#
# Then the deploy runs from the Actions tab (or is triggered for you). Only the
# project ref is a run input — it isn't secret. After a successful run, revoke the
# sbp_ token and rotate any key that was ever pasted into a chat.
name: Garvis go-live
on:
  workflow_dispatch:
    inputs:
      project_ref:
        description: Supabase project ref (the subdomain of https://<ref>.supabase.co)
        required: true

permissions:
  contents: read

jobs:
  go-live:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: ${{ inputs.project_ref }}
      ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - name: Preflight — required secrets present?
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::Missing repo secret SUPABASE_ACCESS_TOKEN. Add it in Settings → Secrets and variables → Actions."
            exit 1
          fi
          if [ -z "$ANTHROPIC_KEY" ] && [ -z "$OPENAI_KEY" ]; then
            echo "::warning::No ANTHROPIC_API_KEY or OPENAI_API_KEY secret set — functions will deploy but stay in honest 'no key' mode until you add them (here or in the Supabase dashboard)."
          fi

      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      # The CLI insists on a config.toml; this repo manages functions without one.
      - name: Ensure minimal supabase config
        run: |
          if [ ! -f supabase/config.toml ]; then
            printf 'project_id = "%s"\n' "$PROJECT_REF" > supabase/config.toml
          fi

      - name: Set AI secrets
        run: |
          args=()
          if [ -n "$ANTHROPIC_KEY" ]; then args+=("ANTHROPIC_API_KEY=$ANTHROPIC_KEY"); fi
          if [ -n "$OPENAI_KEY" ]; then args+=("OPENAI_API_KEY=$OPENAI_KEY"); fi
          if [ ${#args[@]} -gt 0 ]; then
            supabase secrets set --project-ref "$PROJECT_REF" "${args[@]}"
          else
            echo "No AI keys provided as repo secrets — skipping secret set (dashboard values, if any, are untouched)."
          fi

      - name: Deploy AI edge functions
        run: |
          for fn in board-copy generate-image inbox-draft standing-worker; do
            echo "── deploying $fn ──"
            supabase functions deploy "$fn" --project-ref "$PROJECT_REF" --no-verify-jwt
          done

      - name: Done
        run: |
          echo "Secrets + functions live on $PROJECT_REF."
          echo "Now: revoke the sbp_ token and rotate any key pasted in chat."
